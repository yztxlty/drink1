name: Bug report
description: Report a reproducible problem in Drink1.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can so we can reproduce and fix it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
      placeholder: The settings page crashes when I tap save on ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      description: What should have happened?
      placeholder: The settings should save successfully and show a confirmation toast.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      description: What happened instead?
      placeholder: The page stays frozen and no toast appears.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Share the device, WeChat version, and branch or tag you used.
      placeholder: iPhone 15 / WeChat 8.0.x / dev branch
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add screenshots, console logs, or any other details that may help.
      placeholder: Screenshot links, log output, related commit, or release tag.

